<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Page Not Found</title>
</head>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        font-size: 16px;
        background-color: #F4F4F4;
        color: #333;
    }

    h1 {
        background-color: #185337;
        color: white;
        padding: 20px 40px;
        display: flex;
        text-align: center;
    }

    h1 a {
        color: white;
        text-decoration: none;
    }

    .picture {
        display: block;
        margin: 0 auto;
        padding-top: 20px;
        height: 120px;
        width: 636px;
    }

    .accessDenied {
        text-align: center;
        padding: 20px;
        font-size: 70px;
    }

    button {
        background-color: #112549;
        color: white;
        border-radius: 7px;
        font-size: 25px;
        padding: 10px;
        border: none;
        transition: 0.5s;
    }

    button:hover {
        background-color: #adcafe;
        color: #3764b7;
    }

    button a {
        color: white;
        text-decoration: none;
    }

    button a:hover {
        color: #3764b7;
        text-decoration: none;
    }

    footer {
        background-color: #112549;
        color: white;
        padding: 20px 40px;
    }

    ::-moz-selection {
        /* Code for Firefox */
        color: white;
        background: #F3BA1A;
    }

    ::selection {
        color: white;
        background: #F3BA1A;
    }

    .bug {
        text-align: center;
        font-size: large;
    }

    .bug a {
        color: #F3BA1A;
    }
</style>

<body>
    <div>
        <img class="picture" src="./Full_Color_Horizontal_Logo.svg" alt="">
    </div>

    <div class="accessDenied">
        <img src="images/taco_vip.png" alt="">
        <br>
        Error 404.
        <br>
        Page not Found!
    </div>
    <div class="bug">
        Check that your spelling is correct.
        <br>
        Bug? Report it <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSf-EaaW7PyGB0cBB_Mlz5-uF1ATK46hhp81yzH885nYg6zq0w/viewform?usp=publish-editor">here.</a>
    </div>

    <div style="text-align: center; padding: 25px;">
        <button>
            <a href="https://vedranrock.github.io/ISACountdown/">Back to Countdowns</a>
        </button>
    </div>

    <footer>
        <p>&copy; 2025 My Projects. All rights reserved.</p>
        Bug? Report it <a
            href="https://docs.google.com/forms/d/e/1FAIpQLSf-EaaW7PyGB0cBB_Mlz5-uF1ATK46hhp81yzH885nYg6zq0w/viewform?usp=publish-editor">here.</a>
    </footer>
</body>

</html>
